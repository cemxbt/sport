name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/**'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp -r public/* deploy/
          cp public/.htaccess deploy/ 2>/dev/null || true
          mkdir -p deploy/data
          cp data/*.json deploy/data/ 2>/dev/null || true
          rm -f deploy/data/auth.json

      - name: Test FTP Upload
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "test-$(date +%s)" > /tmp/ftp-test.txt
          echo "=== Uploading test file ==="
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" -T /tmp/ftp-test.txt "ftp://$FTP_HOST/ftp-test.txt" -v 2>&1
          echo ""
          echo "=== Uploading packages.json ==="
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" -T deploy/data/packages.json "ftp://$FTP_HOST/data/packages.json" -v 2>&1
