name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/**'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp -r public/* deploy/
          cp public/.htaccess deploy/ 2>/dev/null || true
          cp public/.nojekyll deploy/ 2>/dev/null || true
          mkdir -p deploy/data
          cp data/*.json deploy/data/ 2>/dev/null || true
          rm -f deploy/data/auth.json
          echo "Deploy directory contents:"
          find deploy -type f | head -20

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            mirror -R --delete --verbose ./deploy/ /public_html/;
            bye;
          " -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}
