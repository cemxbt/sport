name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/**'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp -r public/* deploy/
          cp public/.htaccess deploy/ 2>/dev/null || true
          cp public/.nojekyll deploy/ 2>/dev/null || true
          mkdir -p deploy/data
          cp data/*.json deploy/data/ 2>/dev/null || true
          rm -f deploy/data/auth.json

      - name: Debug FTP and Deploy
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "=== FTP Connection Test ==="
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" --list-only 2>&1 || echo "Root listing failed"
          
          echo "=== Checking public_html ==="
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/public_html/" --list-only 2>&1 || echo "public_html listing failed"
          
          echo "=== Upload test file ==="
          echo "deploy-test-$(date +%s)" > /tmp/deploy-test.txt
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" -T /tmp/deploy-test.txt "ftp://$FTP_HOST/public_html/deploy-test.txt" -v 2>&1 || echo "Upload failed"
          
          echo "=== Upload data file ==="
          curl --ftp-ssl -k --user "$FTP_USER:$FTP_PASS" -T deploy/data/packages.json "ftp://$FTP_HOST/public_html/data/packages.json" -v 2>&1 || echo "Data upload failed"
