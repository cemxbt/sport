name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/**'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp -r public/* deploy/
          cp public/.htaccess deploy/ 2>/dev/null || true
          cp public/.nojekyll deploy/ 2>/dev/null || true
          mkdir -p deploy/data
          cp data/*.json deploy/data/ 2>/dev/null || true
          rm -f deploy/data/auth.json

      - name: Deploy via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 10;
            open ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}@${{ secrets.FTP_HOST }};
            mirror -R --delete --verbose --parallel=5 ./deploy/ /public_html/;
            bye;
          "
