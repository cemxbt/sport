name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'data/**'

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare files
        run: |
          mkdir -p deploy
          cp -r public/* deploy/
          cp public/.htaccess deploy/ 2>/dev/null || true
          cp public/.nojekyll deploy/ 2>/dev/null || true
          mkdir -p deploy/data
          cp data/*.json deploy/data/ 2>/dev/null || true
          rm -f deploy/data/auth.json

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 15;
            mirror -R --delete --verbose ./deploy/ /public_html/;
            bye;
          " -u "$FTP_USER","$FTP_PASS" "$FTP_HOST"
